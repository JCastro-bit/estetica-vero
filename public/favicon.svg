<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#6b3e45"/>
  <!-- Gem/diamond - salón de belleza femenino de lujo -->
  <g transform="translate(64,64)">
    <!-- Top facets -->
    <polygon points="0,-32 -28,-8 0,-14" fill="#d6c5c3"/>
    <polygon points="0,-32 28,-8 0,-14" fill="#b2906b"/>
    <!-- Side facets -->
    <polygon points="-28,-8 0,-14 -16,32" fill="#b2906b" opacity="0.9"/>
    <polygon points="28,-8 0,-14 16,32" fill="#d6c5c3" opacity="0.9"/>
    <!-- Bottom facets -->
    <polygon points="0,-14 -16,32 0,38" fill="#c4a07a"/>
    <polygon points="0,-14 16,32 0,38" fill="#d6c5c3" opacity="0.8"/>
    <!-- Top edge -->
    <line x1="-28" y1="-8" x2="28" y2="-8" stroke="#d6c5c3" stroke-width="1.5"/>
    <!-- Sparkle -->
    <circle cx="-22" cy="-24" r="3" fill="white" opacity="0.6"/>
  </g>
</svg>
